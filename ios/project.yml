name: CutReadyCompanion
options:
  bundleIdPrefix: com.cutready
  deploymentTarget:
    iOS: "17.0"
packages:
  CutReadyCompanion:
    path: .
targets:
  CutReadyCompanionApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: CutReadyCompanion
        product: CutReadyCompanionUI
      - package: CutReadyCompanion
        product: CutReadyMobileCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cutready.companion
        PRODUCT_NAME: CutReady Companion
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CutReady
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
