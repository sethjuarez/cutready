name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Optional build number override. Leave empty to use CURRENT_PROJECT_VERSION from the Xcode project."
        required: false
        type: string

jobs:
  upload:
    name: Upload companion to TestFlight
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run package tests
        run: swift test --package-path ios

      - name: Validate release secrets
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CUTREADY_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.CUTREADY_GITHUB_OAUTH_CLIENT_ID }}
        run: |
          set -euo pipefail
          for name in \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID \
            APP_STORE_CONNECT_API_KEY_BASE64 \
            APPLE_TEAM_ID \
            CUTREADY_GITHUB_OAUTH_CLIENT_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              exit 1
            fi
          done

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/appstoreconnect/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Archive companion app
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CUTREADY_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.CUTREADY_GITHUB_OAUTH_CLIENT_ID }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/cutready-companion.xcarchive"
          api_key_path="$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          extra_settings=()
          if [ -n "${BUILD_NUMBER}" ]; then
            extra_settings+=(CURRENT_PROJECT_VERSION="${BUILD_NUMBER}")
          fi

          GIT_CONFIG_COUNT=1 GIT_CONFIG_KEY_0=safe.bareRepository GIT_CONFIG_VALUE_0=all \
          xcodebuild \
            -project ios/CutReadyCompanion.xcodeproj \
            -scheme CutReadyCompanionApp \
            -destination 'generic/platform=iOS' \
            -archivePath "$archive_path" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$api_key_path" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            "${extra_settings[@]}" \
            archive

          /usr/libexec/PlistBuddy -c 'Print :ApplicationProperties:CFBundleShortVersionString' "$archive_path/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :ApplicationProperties:CFBundleVersion' "$archive_path/Info.plist"

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          archive_path="$RUNNER_TEMP/cutready-companion.xcarchive"
          export_path="$RUNNER_TEMP/cutready-companion-export"
          api_key_path="$RUNNER_TEMP/appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          export_options="$RUNNER_TEMP/cutready-export-options.plist"

          cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          GIT_CONFIG_COUNT=1 GIT_CONFIG_KEY_0=safe.bareRepository GIT_CONFIG_VALUE_0=all \
          xcodebuild -exportArchive \
            -archivePath "$archive_path" \
            -exportPath "$export_path" \
            -exportOptionsPlist "$export_options" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$api_key_path" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID"
